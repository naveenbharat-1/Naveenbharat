# API 35 split smoke — focus password without Maestro inputText.
# Prefer data-testid (`login-password`); primary selector is non-optional so a
# silent focus miss fails loud. Text label remains as an optional fallback.
appId: ${APP_ID}
---
- tapOn:
    id: "login-password"
- tapOn:
    text: "Password"
    optional: true
