# Verifies the overlay-sentinel back-button contract for PDFs.
appId: com.safarenglishka.app
---
- launchApp
- tapOn: "My Courses"
- tapOn:
    index: 0
- tapOn:
    text: ".*\\.pdf"
    optional: true
- extendedWaitUntil:
    visible:
      id: "pdf-viewer"
    timeout: 10000
- pressKey: Back            # Should close PDF, NOT exit course
- assertNotVisible:
    id: "pdf-viewer"
