    <!-- Content Security Policy. Rationale & rotation rules: docs/briefs/08-security.md
         - 'unsafe-inline' (script): required by inline boot script + Razorpay checkout.
         - 'unsafe-eval' (script): required by pdf.js worker.
         - 'unsafe-inline' (style): required by Tailwind runtime + shadcn.
         - clickjacking: enforced via `X-Frame-Options: DENY` + `Content-Security-Policy:
           frame-ancestors 'none'` HTTP headers set in `server/index.js`. `frame-ancestors`
           in a <meta> tag is ignored by browsers and would only produce a console warning.
         - `ws:` in connect-src is needed for Vite HMR in dev. In prod the app is served
           over HTTPS so any ws:// is upgraded/blocked as mixed content anyway.
         - upgrade-insecure-requests: any stray http:// is auto-upgraded to https://. -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self' https: data: blob:;
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://*.razorpay.com https://cdn.jsdelivr.net https://mozilla.github.io https://www.youtube.com https://www.youtube-nocookie.com https://s.ytimg.com https://www.gstatic.com;
      style-src 'self' 'unsafe-inline';
      font-src 'self' data:;
      img-src 'self' data: blob: https:;
      media-src 'self' blob: https: https://*.b-cdn.net;
      connect-src 'self' https: wss: ws: https://*.supabase.co wss://*.supabase.co https://*.b-cdn.net https://api.razorpay.com https://lumberjack.razorpay.com https://archive.org;
      frame-src 'self' https: data: blob:;
      worker-src 'self' blob:;
      object-src 'none';
      base-uri 'self';
      form-action 'self' https://*.razorpay.com;
      upgrade-insecure-requests;
    " />

    <style>
      /* Warm paper background matches app theme AND Capacitor splash so the
         native splash → boot screen → React paint sequence shows zero
         white-flash. Dark-mode users get an instant dark surface instead. */
      html,body{margin:0;padding:0;background:#F7F4EE;color:#0b1220;font-family:Inter,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
      #nb-boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#F7F4EE;z-index:9999;transition:opacity .25s ease;pointer-events:none;will-change:opacity}
      #nb-boot img{width:72px;height:72px;border-radius:18px;animation:nb-pulse 1.2s ease-in-out infinite}
      #nb-boot p{font-size:13px;color:#475569;margin:0;letter-spacing:.02em}
      @keyframes nb-pulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.07);opacity:1}}
      /* Note: #nb-boot stays cream (#F7F4EE) on dark devices too — this matches
         the native Android/iOS splash drawable so users see ZERO theme flash
         during the splash → React paint handoff. The app's own pages handle
         dark-mode theming after React mounts. */
      @media (prefers-color-scheme: dark){
        html,body{background:#0b1220;color:#e2e8f0}
        #nb-boot p{color:#475569}
      }
    </style>

  <body>
    <!--
      Boot splash removed per product decision — the native Capacitor splash
      already covers the pre-React window, and the cream background on
      html/body prevents a white flash. Keeping the JS below (killBoot,
      __nbKillBoot) as a no-op so SplashHider callers don't crash.
    -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Robust boot-screen removal: fires on FIRST React paint via MutationObserver,
      // not waiting for window.load (which can hang on slow fonts/3p scripts).
      // Multiple removal paths + hard 3s timeout = boot can NEVER block scroll.
      (function(){
        var removed = false;
        function killBoot(){
          if (removed) return; removed = true;
          var b = document.getElementById('nb-boot');
          if (!b) return;
          b.style.opacity = '0';
          setTimeout(function(){ if (b && b.parentNode) b.parentNode.removeChild(b); }, 320);
        }
        // 1) React paint observer — fires the millisecond <App/> renders.
        var root = document.getElementById('root');
        if (root && 'MutationObserver' in window) {
          var mo = new MutationObserver(function(){
            if (root.childNodes.length > 0) { mo.disconnect(); killBoot(); }
          });
          mo.observe(root, { childList: true });
        }
        // 2) Window load fallback.
        window.addEventListener('load', function(){ setTimeout(killBoot, 50); });
        // 3) Hard 3s safety — boot screen NEVER stays past 3s regardless of cause.
        setTimeout(killBoot, 3000);
        // 4) Exposed for SplashHider too.
        window.__nbKillBoot = killBoot;

        // Defer service-worker cleanup until the browser is idle so it can't
        // delay first paint. Wiping stale SWs/caches still happens — just not
        // on the critical path.
        var idle = window.requestIdleCallback || function(cb){ return setTimeout(cb, 1200); };
        idle(function(){
          // Only wipe stale SW/caches on NATIVE (Capacitor) builds. On web,
          // a future PWA SW would be silently nuked on every page load.
          var isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
          if (!isNative) return;
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations()
              .then(function(rs){ rs.forEach(function(r){ r.unregister(); }); })
              .catch(function(){});
          }
          if ('caches' in window) {
            caches.keys()
              .then(function(keys){ keys.forEach(function(k){ caches.delete(k); }); })
              .catch(function(){});
          }
        });
      })();
    </script>
