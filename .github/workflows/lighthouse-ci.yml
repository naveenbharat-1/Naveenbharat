name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lhci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Mobile perf budget (Moto-G class)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22.18.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-lhci-nm-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}

      - name: Install deps (bun)
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          if [ -f bun.lockb ] || [ -f bun.lock ]; then
            bun install --frozen-lockfile --no-progress --ignore-scripts \
              || bun install --no-progress --ignore-scripts
          else
            bun install --no-progress --ignore-scripts
          fi

      - name: Build production bundle
        run: bun run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Install Lighthouse CI
        run: npm i -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun --config=./lighthouserc.json
        env:
          LHCI_BUILD_CONTEXT__CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
          LHCI_BUILD_CONTEXT__COMMIT_TIME: ${{ github.event.head_commit.timestamp }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-report-${{ github.run_id }}
          path: .lighthouseci/
          retention-days: 1
          if-no-files-found: ignore
