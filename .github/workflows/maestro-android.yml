name: Maestro Android E2E

# Real-device-style end-to-end smoke on an Android emulator using Maestro.
# Manual-dispatch only (emulator boots are slow ~10-15 min) plus optional
# nightly cron. Builds a debug APK, boots an emulator, installs the APK,
# then runs `maestro/*.yaml` flows.
#
# Requires GitHub repo secrets (already configured):
#   MAESTRO_EMAIL, MAESTRO_PASSWORD

on:
  workflow_dispatch:
  schedule:
    # Nightly 04:30 UTC — off-peak so it doesn't fight with release builds
    - cron: '30 4 * * *'

concurrency:
  group: maestro-${{ github.ref }}
  cancel-in-progress: true

# Single source of truth for the JDK across every Android workflow.
# Capacitor 6+ plugins compile against Java 21 (see android/app/capacitor.build.gradle
# — sourceCompatibility/targetCompatibility VERSION_21). Bumping in one place
# prevents the "invalid source release: 21" drift that failed maestro run #1.
env:
  JAVA_VERSION: '21'

jobs:
  android-e2e:
    # macOS runner: hardware acceleration (HAXM/HVF) makes the emulator
    # bootable in ~3-5 min instead of the 15+ min it takes on Ubuntu (KVM
    # is not enabled on GitHub-hosted Linux runners).
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.18'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 📦 Install deps
        run: bun install --frozen-lockfile --ignore-scripts

      - name: 🏗️ Build web assets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: bun run build

      - name: 🔁 Cap sync
        run: bunx cap sync android

      - name: 🏗️ Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: 📥 Install Maestro
        run: |
          curl -fsSL https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: 🤖 Run Android emulator + Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            export MAESTRO_EMAIL='${{ secrets.MAESTRO_EMAIL }}'
            export MAESTRO_PASSWORD='${{ secrets.MAESTRO_PASSWORD }}'
            maestro test --env MAESTRO_EMAIL="$MAESTRO_EMAIL" --env MAESTRO_PASSWORD="$MAESTRO_PASSWORD" maestro/smoke.yaml --format junit --output maestro-report.xml || echo "smoke failed"
            maestro test maestro/pdf-back.yaml || true
            maestro test maestro/back-button-cold-start.yaml || true

      - name: 📤 Upload Maestro report + screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: maestro-report
          path: |
            maestro-report.xml
            ~/.maestro/tests/**/*
          retention-days: 14
          if-no-files-found: ignore

      # On any failure (typically a pre-Maestro gradle compile error, as in
      # run #1), grab gradle's build reports + logs so the next triage pass
      # can jump straight to the failing task instead of scrolling logs.
      - name: 📤 Upload gradle build reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: gradle-build-reports
          path: |
            android/**/build/reports/**/*
            android/**/build/outputs/logs/**/*
          retention-days: 7
          if-no-files-found: ignore
