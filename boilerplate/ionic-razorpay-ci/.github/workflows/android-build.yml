name: Android Debug APK

# Builds an unsigned debug APK on every push to main and on manual dispatch.
# The APK is uploaded as a workflow artifact — download from the Actions tab.
#
# For a SIGNED release APK / AAB, add these GitHub repo secrets:
#   ANDROID_KEYSTORE_BASE64   -- `base64 -w0 release.keystore`
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
# then decode the keystore in a step before `assembleRelease`.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boilerplate/ionic-razorpay-ci
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: boilerplate/ionic-razorpay-ci/package-lock.json

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: boilerplate/ionic-razorpay-ci/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: boilerplate/ionic-razorpay-ci/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error